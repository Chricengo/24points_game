<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>24點挑戰 🧠</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #fffaf0; touch-action: manipulation; }
        .input-group { margin: 25px 0; display: flex; gap: 10px; }
        .num-box { width: 60px; height: 60px; font-size: 24px; text-align: center; border: 3px solid #ffd93d; border-radius: 12px; }
        .num-box:focus { border-color: #ff6b6b; outline: none; }
        button { padding: 15px 40px; font-size: 20px; border-radius: 50px; background-color: #6c5ce7; color: white; border: none; font-weight: bold; }
        li { background: white; margin-bottom: 10px; padding: 12px; border-radius: 15px; border-left: 5px solid #6c5ce7; list-style: none; font-family: monospace; }
    </style>
</head>
<body>

    <h1>🧠 24點挑戰 🔢</h1>
    <div class="input-group">
        <input type="number" class="num-box" oninput="handleInput(this)" onfocus="this.value=''" placeholder="?">
        <input type="number" class="num-box" oninput="handleInput(this)" onfocus="this.value=''" placeholder="?">
        <input type="number" class="num-box" oninput="handleInput(this)" onfocus="this.value=''" placeholder="?">
        <input type="number" class="num-box" oninput="handleInput(this)" onfocus="this.value=''" placeholder="?">
    </div>
    <button onclick="runSolver()">🚀 開始計算！</button>
    <div id="results"></div>

    <script>
        let timer = null;

        function handleInput(el) {
            clearTimeout(timer);
            let val = el.value;

            // 如果是輸入 1，等待 400ms 判斷下一個輸入是否為 0
            if (val === "1") {
                timer = setTimeout(() => {
                    moveToNext(el);
                }, 400);
            } 
            // 如果當前是 "1" 且下一個輸入不是 "0"，則觸發修正邏輯
            else if (val.length > 1 && val[0] === "1" && val[1] !== "0") {
                let currentDigit = val[0];
                let nextDigit = val[1];
                
                el.value = currentDigit; // 當前框設為 1
                const next = el.nextElementSibling;
                if (next && next.tagName === 'INPUT') {
                    next.value = nextDigit; // 下一個框設為剛輸入的數字
                    next.focus();
                }
            } 
            // 正常輸入 10 或其他數字
            else if (val.length >= 2 || (val >= 2 && val <= 9)) {
                moveToNext(el);
            }
        }

        function moveToNext(el) {
            const next = el.nextElementSibling;
            if (next && next.tagName === 'INPUT') next.focus();
        }

        function runSolver() {
            const inputs = document.querySelectorAll('.num-box');
            const nums = [];
            for (let input of inputs) {
                let val = parseInt(input.value);
                if (isNaN(val) || val < 1 || val > 10) { alert("⚠️ 請輸入 1-10！"); return; }
                nums.push(val);
            }
            const results = new Set();
            solve(nums, results);
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = results.size > 0 
                ? "<ul>" + Array.from(results).map(r => `<li>${r.replace(/\*/g, '×').replace(/\//g, '÷')} = 24</li>`).join('') + "</ul>"
                : "<h3>😢 無解喔！</h3>";
        }

        // (solve 函數保持不變)
        function solve(nums, results) {
            function getPermutations(arr) {
                if (arr.length <= 1) return [arr];
                let perms = [];
                for (let i = 0; i < arr.length; i++) {
                    let rest = getPermutations(arr.slice(0, i).concat(arr.slice(i + 1)));
                    for (let p of rest) perms.push([arr[i], ...p]);
                }
                return perms;
            }
            const ops = ['+', '-', '*', '/'];
            const perms = getPermutations(nums);
            for (let p of perms) {
                for (let o1 of ops) for (let o2 of ops) for (let o3 of ops) {
                    const exprs = [
                        `(((${p[0]}${o1}${p[1]})${o2}${p[2]})${o3}${p[3]})`,
                        `(${p[0]}${o1}(${p[1]}${o2}${p[2]}))${o3}${p[3]}`,
                        `${p[0]}${o1}((${p[1]}${o2}${p[2]})${o3}${p[3]})`,
                        `${p[0]}${o1}(${p[1]}${o2}(${p[2]}${o3}${p[3]}))`,
                        `(${p[0]}${o1}${p[1]})${o2}(${p[2]}${o3}${p[3]})`
                    ];
                    for (let e of exprs) {
                        try {
                            let val = eval(e.replace(/\//g, '/1.0/'));
                            if (Math.abs(val - 24) < 0.0001 && val % 1 === 0 && val > 0) results.add(e);
                        } catch (err) {}
                    }
                }
            }
        }
    </script>
</body>
</html>
